<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NicoUber</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
  margin:0;
  font-family: system-ui;
  background:#0b0b0b;
  color:white;
}

.app {
  max-width:420px;
  margin:auto;
  padding:15px;
}

h2 {
  text-align:center;
}

/* INPUTS + BUTTONS */
input, button {
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  font-size:15px;
  font-weight:bold;
  box-sizing:border-box;
}

input {
  background:#1c1c1c;
  color:white;
}

button {
  background:#00ff88;
  cursor:pointer;
}

input:focus {
  outline:none;
  border:2px solid #00ff88;
}

/* MAP */
#map {
  height:300px;
  margin-top:15px;
  border-radius:12px;
  opacity:1;
  transition:opacity 0.5s ease, transform 0.5s ease;
}

#map.hidden {
  opacity:0;
  transform:scale(1.03);
  pointer-events:none;
}

/* DRIVER */
.title {
  margin-top:15px;
  text-align:center;
  color:#aaa;
}

.driver {
  background:#1a1a1a;
  padding:12px;
  margin-top:8px;
  border-radius:12px;
  cursor:pointer;
  border:2px solid transparent;
}

.driver.active {
  border:2px solid #00ff88;
}

/* LOADING SCREEN */
.screen {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}

.spinner {
  width:50px;
  height:50px;
  border:4px solid #333;
  border-top:4px solid #00ff88;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin {
  100% { transform:rotate(360deg); }
}

/* 🚗 UBER BOTTOM SHEET */
.bottom-sheet {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;

  background: #0f0f0f;
  border-top-left-radius: 18px;
  border-top-right-radius: 18px;

  padding: 16px;
  transform: translateY(100%);
  transition: transform 0.35s ease;

  z-index: 999;
  max-height: 70vh;
  overflow-y: auto;

  border-top: 1px solid #2a2a2a;
}

.bottom-sheet.active {
  transform: translateY(0);
}

.bottom-handle {
  width: 50px;
  height: 5px;
  background: #333;
  border-radius: 10px;
  margin: 0 auto 12px auto;
}

/* 📸 Screenshot Mode */
.screenshot-mode {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.screenshot-mode .app > *:not(.bottom-sheet):not(#backBtn) {
  display:none;
}

.screenshot-mode #map {
  display:none !important;
}
</style>
</head>

<body>

<div class="app">

<h2>🚗 NicoUber</h2>

<input id="name" placeholder="Dein Name">
<input id="from" placeholder="Startadresse">
<input id="to" placeholder="Zieladresse">
<input type="time" id="time">

<div class="title">Bitte Fahrer wählen</div>

<div class="driver active" onclick="selectDriver('nico', this)">
  🚗 Nico<br><small>Hyundai i30N</small>
</div>

<div class="driver" onclick="selectDriver('kevin', this)">
  🚘 Kevin<br><small>Mercedes AMG</small>
</div>

<button onclick="startRide()">Fahrt starten</button>
<button onclick="resetRide()">Neue Fahrt beginnen</button>
<button onclick="screenshotMode()">📸 Screenshot Ansicht</button>

<div id="map"></div>

<!-- 🚀 BOTTOM SHEET -->
<div id="bottomSheet" class="bottom-sheet">
  <div class="bottom-handle"></div>
  <div id="summary"></div>
</div>

<button id="backBtn" style="display:none;" onclick="exitScreenshot()">⬅️ Zurück</button>

</div>

<div class="screen" id="screen">
  <div class="spinner"></div>
  <h2>🚗 Fahrer wird informiert...</h2>
</div>

<script>

let map = L.map('map').setView([52.3759, 9.7320], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let selectedDriver="nico";
let carMarker,routeCoords=[],step=0,timer;

function selectDriver(d,el){
  selectedDriver=d;
  document.querySelectorAll(".driver").forEach(x=>x.classList.remove("active"));
  el.classList.add("active");
}

function getDriver(){
  return selectedDriver==="nico"
    ? {name:"Nico",car:"Hyundai i30N"}
    : {name:"Kevin",car:"Mercedes AMG"};
}

async function geocode(q){
  let r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}`);
  let d=await r.json();
  return d[0];
}

async function startRide(){

  let driver=getDriver();

  let name=document.getElementById("name").value;
  let from=document.getElementById("from").value;
  let to=document.getElementById("to").value;
  let time=document.getElementById("time").value||"sofort";

  if(!name||!from||!to){
    alert("Alles ausfüllen!");
    return;
  }

  document.getElementById("map").classList.add("hidden");
  document.getElementById("screen").style.display="flex";

  let s=await geocode(from);
  let e=await geocode(to);

  let res=await fetch(`https://router.project-osrm.org/route/v1/driving/${s.lon},${s.lat};${e.lon},${e.lat}?overview=full&geometries=geojson`);
  let data=await res.json();

  routeCoords=data.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]);

  let dist=(data.routes[0].distance/1000).toFixed(2);
  let rb=dist>50?2:1;

  let poly=L.polyline(routeCoords).addTo(map);

  /* 💳 BOTTOM SHEET CONTENT */
  document.getElementById("summary").innerHTML=`
    <div style="font-size:18px;font-weight:700;margin-bottom:8px;">
      🚗 NicoUber Receipt
    </div>

    <div style="color:#aaa;font-size:13px;margin-bottom:12px;">
      Fahrtbestätigung
    </div>

    👤 <b>${name}</b><br><br>
    🕒 ${time}<br><br>

    📍 <b>Startadresse:</b><br>
    <span style="color:#aaa">${from}</span><br><br>

    🎯 <b>Zieladresse:</b><br>
    <span style="color:#aaa">${to}</span><br><br>

    🚗 ${driver.name} (${driver.car})<br>
    📏 ${dist} km<br>
    🥤 ${rb} Red Bull<br><br>

    <div style="text-align:center;color:#00ff88;font-weight:600;">
      📸 Screenshot an ${driver.name}
    </div>
  `;

  setTimeout(()=>{

    document.getElementById("screen").style.display="none";

    setTimeout(()=>{
      document.getElementById("map").classList.remove("hidden");
      map.invalidateSize();
      map.fitBounds(poly.getBounds(), {
        animate:true,
        duration:1.2
      });

      startDrive();

      /* 🚀 SHEET SLIDE UP */
      document.getElementById("bottomSheet").classList.add("active");

    },200);

  },1000);
}

function startDrive(){
  step=0;
  carMarker=L.marker(routeCoords[0]).addTo(map);

  timer=setInterval(()=>{
    if(step>=routeCoords.length){
      clearInterval(timer);
      return;
    }
    carMarker.setLatLng(routeCoords[step]);
    step++;
  },250);
}

/* 📸 Screenshot Mode */
function screenshotMode(){
  document.body.classList.add("screenshot-mode");
  document.getElementById("backBtn").style.display="block";
}

function exitScreenshot(){
  document.body.classList.remove("screenshot-mode");
  document.getElementById("backBtn").style.display="none";
}

function resetRide(){
  document.getElementById("from").value="";
  document.getElementById("to").value="";
  document.getElementById("time").value="";
  document.getElementById("bottomSheet").classList.remove("active");
  exitScreenshot();
  map.setView([52.3759, 9.7320], 13);
}

</script>

</body>
</html>
