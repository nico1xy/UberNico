<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NicoUber</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
  margin:0;
  font-family: system-ui;
  background:#0b0b0b;
  color:white;
}

.app {
  max-width:420px;
  margin:auto;
  padding:15px;
}

h2 { text-align:center; }

input, button {
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  font-size:15px;
  font-weight:bold;
}

input {
  background:#1c1c1c;
  color:white;
}

button {
  background:#00ff88;
  cursor:pointer;
}

input:focus {
  outline:none;
  border:2px solid #00ff88;
}

#map {
  height:300px;
  margin-top:15px;
  border-radius:12px;
}

.card {
  margin-top:12px;
  background:#1a1a1a;
  padding:12px;
  border-radius:12px;
}

/* 📋 SUMMARY */
.summary {
  margin-top:12px;
  background:#121212;
  border:2px dashed #00ff88;
  padding:12px;
  border-radius:12px;
}

/* Fahrer */
.title {
  margin-top:15px;
  text-align:center;
  color:#aaa;
}

.driver {
  background:#1a1a1a;
  padding:12px;
  margin-top:8px;
  border-radius:12px;
  cursor:pointer;
  border:2px solid transparent;
}

.driver.active {
  border:2px solid #00ff88;
}

/* 📸 Screenshot Mode */
.screenshot-mode .app > *:not(.summary) {
  display:none;
}

.screenshot-mode .summary {
  display:block;
}

/* Fullscreen */
.screen {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.spinner {
  width:50px;
  height:50px;
  border:4px solid #333;
  border-top:4px solid #00ff88;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin {
  100% { transform:rotate(360deg); }
}
</style>
</head>

<body>

<div class="app">

<h2>🚗 NicoUber</h2>

<input id="name" placeholder="Dein Name">
<input id="from" placeholder="Startadresse">
<input id="to" placeholder="Zieladresse">
<input type="time" id="time">

<div class="title">Bitte wählen Sie Ihren Fahrer</div>

<div class="driver active" onclick="selectDriver('nico', this)">
  🚗 Nico<br><small>Hyundai i30N</small>
</div>

<div class="driver" onclick="selectDriver('kevin', this)">
  🚘 Kevin<br><small>Mercedes AMG</small>
</div>

<button onclick="startRide()">Fahrt starten</button>
<button onclick="resetRide()">Neue Fahrt beginnen</button>
<button onclick="screenshotMode()">📸 Screenshot Ansicht</button>

<div id="map"></div>

<div class="card" id="info"></div>

<div class="summary" id="summary" style="display:none;"></div>

</div>

<div class="screen" id="screen">
  <div class="spinner"></div>
  <h2>Fahrer wird gesucht...</h2>
</div>

<script>

let map = L.map('map').setView([52.3759, 9.7320], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let selectedDriver="nico";
let carMarker,routeCoords=[],step=0,timer;

function selectDriver(d,el){
  selectedDriver=d;
  document.querySelectorAll(".driver").forEach(x=>x.classList.remove("active"));
  el.classList.add("active");
}

function getDriver(){
  return selectedDriver==="nico"
    ? {name:"Nico",car:"Hyundai i30N"}
    : {name:"Kevin",car:"Mercedes AMG"};
}

async function geocode(q){
  let r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}`);
  let d=await r.json();
  return d[0];
}

async function startRide(){

  let driver=getDriver();

  let name = document.getElementById("name").value;
  let from = document.getElementById("from").value;
  let to = document.getElementById("to").value;
  let time = document.getElementById("time").value || "sofort";

  if(!name||!from||!to){
    alert("Alles ausfüllen!");
    return;
  }

  document.getElementById("screen").style.display="flex";

  let s=await geocode(from);
  let e=await geocode(to);

  let res=await fetch(`https://router.project-osrm.org/route/v1/driving/${s.lon},${s.lat};${e.lon},${e.lat}?overview=full&geometries=geojson`);
  let data=await res.json();

  routeCoords=data.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]);

  let dist=(data.routes[0].distance/1000).toFixed(2);
  let rb=dist>50?2:1;

  let poly=L.polyline(routeCoords).addTo(map);
  map.fitBounds(poly.getBounds());

  document.getElementById("info").innerHTML=`
    🚗 Fahrer: ${driver.name}<br>
    📍 ${dist} km<br>
    🥤 ${rb} Red Bull<br>
    📸 Screenshot an ${driver.name}
  `;

  document.getElementById("summary").style.display="block";
  document.getElementById("summary").innerHTML=`
    📋 <b>Fahrt Zusammenfassung</b><br><br>
    👤 ${name}<br>
    🕒 ${time}<br>
    📍 ${from}<br>
    ➡️ ${to}<br>
    🚗 ${driver.name} (${driver.car})<br>
    📏 ${dist} km<br>
    🥤 ${rb} Red Bull
  `;

  setTimeout(()=>{
    document.getElementById("screen").style.display="none";
    startDrive();
  },2000);
}

function startDrive(){
  step=0;
  carMarker=L.marker(routeCoords[0]).addTo(map);

  timer=setInterval(()=>{
    if(step>=routeCoords.length){
      clearInterval(timer);
      return;
    }
    carMarker.setLatLng(routeCoords[step]);
    step++;
  },250);
}

function resetRide(){
  document.getElementById("from").value="";
  document.getElementById("to").value="";
  document.getElementById("time").value="";
  document.getElementById("info").innerHTML="";
  document.getElementById("summary").style.display="none";
  document.body.classList.remove("screenshot-mode");
  map.setView([52.3759,9.7320],13);
}

/* 📸 Screenshot Mode */
function screenshotMode(){
  document.body.classList.toggle("screenshot-mode");
}

</script>

</body>
</html>
