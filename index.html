<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NicoUber</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
  margin:0;
  font-family: system-ui;
  background:#0b0b0b;
  color:white;
}

.app {
  max-width:420px;
  margin:auto;
  padding:15px;
}

h2 { text-align:center; }

/* INPUTS */
input, button {
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  font-size:15px;
  font-weight:bold;
  box-sizing:border-box;
}

input {
  background:#1c1c1c;
  color:white;
}

input:focus {
  outline:none;
  border:2px solid #00ff88 !important;
}

/* TIME */
.field { margin-top:10px; }

.label {
  font-size:12px;
  color:#aaa;
  margin-bottom:6px;
  padding-left:2px;
}

input[type="time"] {
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  font-size:15px;
  background:#1c1c1c;
  color:white;
  box-sizing:border-box;
  height:48px;
  -webkit-appearance:none;
}

/* BUTTON */
button {
  background:#00ff88;
  cursor:pointer;
  color:#000;
}

/* MAP */
#map {
  height:300px;
  margin-top:15px;
  border-radius:12px;
}

/* DRIVER */
.title {
  margin-top:15px;
  text-align:center;
  color:#aaa;
}

.driver {
  background:#1a1a1a;
  padding:12px;
  margin-top:8px;
  border-radius:12px;
  cursor:pointer;
  border:2px solid transparent;
}

.driver.active {
  border:2px solid #00ff88;
}

/* BLUR */
body.sheet-open .app,
body.sheet-open #map {
  filter: blur(6px);
}

/* SHEET */
.bottom-sheet {
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  background:#0f0f0f;
  border-top-left-radius:18px;
  border-top-right-radius:18px;
  padding:16px;

  transform:translateY(100%);
  transition:transform 0.35s ease;

  max-height:70vh;
  overflow:auto;
  z-index:1000;
}

.bottom-sheet.open {
  transform:translateY(0%);
}

.bottom-handle {
  width:50px;
  height:5px;
  background:#333;
  border-radius:10px;
  margin:0 auto 12px auto;
  cursor:pointer;
}

#sheetDock {
  position:fixed;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  width:70px;
  height:6px;
  background:#444;
  border-radius:10px;
  z-index:999;
  cursor:pointer;
}

/* RECEIPT */
.receipt {
  background:#0f0f0f;
  padding:16px;
  border-radius:14px;
  border:1px solid #2a2a2a;
  line-height:1.5;
}

/* MAP FIX */
.leaflet-control-container {
  z-index:400 !important;
}

/* LOADING */
.screen {
  position:fixed;
  inset:0;
  background:#000;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}

.spinner {
  width:50px;
  height:50px;
  border:4px solid #333;
  border-top:4px solid #00ff88;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin-bottom:10px;
}

@keyframes spin {
  100% { transform:rotate(360deg); }
}

/* 💸 PAYMENT CONFIRMED */
.payment {
  position:fixed;
  left:50%;
  top:45%;
  transform:translate(-50%,-50%) scale(0.8);
  background:#0f0f0f;
  border:1px solid #00ff88;
  padding:18px 22px;
  border-radius:14px;
  text-align:center;
  z-index:10000;
  opacity:0;
  transition:0.35s ease;
  pointer-events:none;
}

.payment.show {
  opacity:1;
  transform:translate(-50%,-50%) scale(1);
}

.payment-check {
  font-size:30px;
  color:#00ff88;
  margin-bottom:6px;
}

/* 🥤 RED BULL FLY */
.rb-fly {
  position:fixed;
  left:50%;
  top:60%;
  transform:translate(-50%,0);
  font-size:28px;
  opacity:0;
  z-index:10001;
}

.rb-fly.animate {
  animation:flyRB 1.2s ease forwards;
}

@keyframes flyRB {
  0%   { transform:translate(-50%,20px) scale(0.8); opacity:0; }
  20%  { opacity:1; }
  100% { transform:translate(-50%,-120px) scale(1.2); opacity:0; }
}
</style>
</head>

<body>

<div class="app">

<h2>🚗 NicoUber</h2>

<input id="name" placeholder="Dein Name">
<input id="from" placeholder="Startadresse">
<input id="to" placeholder="Zieladresse">

<div class="field">
  <div class="label">⏰ Uhrzeit wählen</div>
  <input type="time" id="time">
</div>

<div class="title">Fahrer wählen</div>

<div class="driver active" onclick="selectDriver('nico',this)">
🚗 Nico<br><small>Hyundai i30N</small>
</div>

<div class="driver" onclick="selectDriver('kevin',this)">
🚘 Kevin<br><small>90k Mercedes</small>
</div>

<button onclick="startRide()">Abholung starten</button>
<button onclick="resetRide()">Nächste Abholung starten</button>

<div id="map"></div>

</div>

<!-- SHEET -->
<div id="bottomSheet" class="bottom-sheet">
  <div class="bottom-handle" onclick="toggleSheet()"></div>
  <div id="sheetContent"></div>
</div>

<div id="sheetDock" onclick="toggleSheet()"></div>

<!-- LOADING -->
<div class="screen" id="screen">
  <div class="spinner"></div>
  <h3>🚗 Fahrer wird informiert...</h3>
</div>

<!-- 💸 PAYMENT -->
<div id="payment" class="payment">
  <div class="payment-check">✔</div>
  <div>Zahlung bestätigt</div>
  <div style="font-size:12px;color:#aaa;margin-top:4px;">
    Red Bull wurde übergeben
  </div>
</div>

<!-- 🥤 FLY -->
<div id="rbFly" class="rb-fly">🥤</div>

<script>

let map = L.map('map').setView([52.3759, 9.7320], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let selectedDriver="nico";
let routeCoords=[],carMarker,step=0,timer;

let sheet=document.getElementById("bottomSheet");
let isOpen=false;

/* DRIVER */
function selectDriver(d,el){
  selectedDriver=d;
  document.querySelectorAll(".driver").forEach(x=>x.classList.remove("active"));
  el.classList.add("active");
}

function getDriver(){
  return selectedDriver==="nico"
    ? {name:"Nico",car:"Hyundai i30N"}
    : {name:"Kevin",car:"90k Mercedes"};
}

/* GEOCODE */
async function geocode(q){
  let r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}`);
  let d=await r.json();
  return d[0];
}

/* SHEET */
function openSheet(){
  document.body.classList.add("sheet-open");
  sheet.classList.add("open");
  document.getElementById("sheetDock").style.display="none";

  map.dragging.disable();
  map.scrollWheelZoom.disable();
  isOpen=true;
}

function toggleSheet(){
  isOpen ? closeSheet() : openSheet();
}

function closeSheet(){
  document.body.classList.remove("sheet-open");
  sheet.classList.remove("open");
  document.getElementById("sheetDock").style.display="block";

  map.dragging.enable();
  map.scrollWheelZoom.enable();
  isOpen=false;
}

/* 💸 ANIMATION */
function showPayment(){
  let p=document.getElementById("payment");
  let rb=document.getElementById("rbFly");

  p.classList.add("show");
  rb.classList.add("animate");

  setTimeout(()=>{
    p.classList.remove("show");
    rb.classList.remove("animate");
  },1200);
}

/* MAIN */
async function startRide(){

  let driver=getDriver();

  let name=document.getElementById("name").value;
  let from=document.getElementById("from").value;
  let to=document.getElementById("to").value;
  let time=document.getElementById("time").value||"sofort";

  if(!name||!from||!to){
    alert("Alles ausfüllen!");
    return;
  }

  document.getElementById("screen").style.display="flex";

  let forceExit = setTimeout(()=>{
    document.getElementById("screen").style.display="none";
  }, 2500); // 💡 HARTE ABSICHERUNG

  try {

    let s = await geocode(from);
    let e = await geocode(to);

    // ❗ Fallback wenn Geocode fail
    if(!s || !e){
      throw new Error("Geocode failed");
    }

    let res = await fetch(
      `https://router.project-osrm.org/route/v1/driving/${s.lon},${s.lat};${e.lon},${e.lat}?overview=full&geometries=geojson`
    );

    let data = await res.json();

    if(!data.routes || !data.routes[0]){
      throw new Error("Route failed");
    }

    routeCoords = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
    let poly = L.polyline(routeCoords).addTo(map);

    let dist = (data.routes[0].distance / 1000).toFixed(2);
    let rb = dist > 50 ? 2 : 1;

    // ⏱ Fake Loading stabil (immer 1 Sekunde)
    setTimeout(()=>{

      clearTimeout(forceExit); // stop safety timer
      document.getElementById("screen").style.display="none";

      map.fitBounds(poly.getBounds());
      startDrive();
      openSheet();
      showPayment();

      document.getElementById("sheetContent").innerHTML=`
        <div class="receipt">
          📸 Bitte Screenshot dieser Fahrt an ${driver.name} über WhatsApp senden<br><br>

          👤 Name: ${name}<br>
          🕒 Abholzeit: ${time}<br><br>

          📍 Start: ${from}<br>
          🎯 Ziel: ${to}<br><br>

          🚘 Fahrer: ${driver.name} (${driver.car})<br>
          📏 Kilometer: ${dist} km<br>
          🥤 Bezahlung: ${rb} Red Bull
        </div>
      `;

    }, 1000);

  } catch(err){

    console.log("ERROR:", err);

    // ❗ IMMER STOPPEN
    clearTimeout(forceExit);
    document.getElementById("screen").style.display="none";

    alert("Route konnte nicht geladen werden 😅");
  }
}

/* DRIVE */
function startDrive(){
  step=0;
  carMarker=L.marker(routeCoords[0]).addTo(map);

  timer=setInterval(()=>{
    if(step>=routeCoords.length){
      clearInterval(timer);
      return;
    }
    carMarker.setLatLng(routeCoords[step]);
    step++;
  },250);
}

/* RESET */
function resetRide(){
  document.getElementById("from").value="";
  document.getElementById("to").value="";
  document.getElementById("time").value="";
  closeSheet();
  map.setView([52.3759,9.7320],13);
}

</script>

</body>
</html>
