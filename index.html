<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NicoUber</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
  margin:0;
  font-family: system-ui;
  background:#0b0b0b;
  color:white;
}

.app {
  max-width:420px;
  margin:auto;
  padding:15px;
}

h2 {
  text-align:center;
}

input, button {
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  font-size:15px;
  font-weight:bold;
  cursor:pointer;
  box-sizing:border-box;
}

input {
  background:#1c1c1c;
  color:white;
  cursor:text;
}

button {
  background:#00ff88;
}

button:hover {
  transform:scale(1.03);
}

#map {
  height:300px;
  margin-top:15px;
  border-radius:12px;
}

.card {
  margin-top:12px;
  background:#1a1a1a;
  padding:12px;
  border-radius:12px;
}

.status {
  font-weight:bold;
  color:#00ff88;
}

/* 🔥 FULLSCREEN MATCHING */
.screen {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
  text-align:center;
}

.spinner {
  width:50px;
  height:50px;
  border:4px solid #333;
  border-top:4px solid #00ff88;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin-bottom:15px;
}

@keyframes spin {
  100% { transform:rotate(360deg); }
}

.driverCard {
  margin-top:20px;
  background:#1a1a1a;
  padding:15px;
  border-radius:12px;
  width:80%;
}
</style>
</head>

<body>

<div class="app">

<h2>🚗 NicoUber</h2>

<input id="name" placeholder="Dein Name">
<input id="from" placeholder="Startadresse">
<input id="to" placeholder="Zieladresse">

<!-- 🚘 Fahrer Auswahl -->
<select id="driver">
  <option value="nico">Nico (Hyundai i30N)</option>
  <option value="kevin">Kevin (Mercedes 90k)</option>
</select>

<button onclick="startRide()">Fahrt starten</button>
<button onclick="resetRide()">Neue Fahrt beginnen</button>

<div id="map"></div>

<div class="card" id="info"></div>

</div>

<!-- 🔥 FULLSCREEN SCREEN -->
<div class="screen" id="screen">
  <div class="spinner"></div>
  <h2>Fahrer wird gesucht...</h2>

  <div class="driverCard" id="driverCard"></div>
</div>

<script>

let map = L.map('map').setView([52.3759, 9.7320], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let carMarker;
let routeCoords = [];
let step = 0;
let timer;

document.getElementById("name").value = localStorage.getItem("name") || "";

function saveName() {
  localStorage.setItem("name", document.getElementById("name").value);
}

/* 👤 Fahrer Daten */
function getDriver() {
  let d = document.getElementById("driver").value;

  if(d === "nico") {
    return {
      name: "Nico",
      car: "Hyundai i30N"
    };
  } else {
    return {
      name: "Kevin",
      car: "Mercedes AMG (90k)"
    };
  }
}

async function geocode(q) {
  let url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}`;
  let res = await fetch(url);
  let data = await res.json();
  return data[0];
}

async function startRide() {

  saveName();

  let driver = getDriver();

  let name = document.getElementById("name").value;
  let from = document.getElementById("from").value;
  let to = document.getElementById("to").value;

  if(!name || !from || !to){
    alert("Alles ausfüllen!");
    return;
  }

  /* 🔥 FULLSCREEN SHOW */
  document.getElementById("screen").style.display = "flex";

  document.getElementById("driverCard").innerHTML = `
    🚗 ${driver.name}<br>
    🚘 ${driver.car}<br><br>
    wird zugewiesen...
  `;

  let start = await geocode(from);
  let end = await geocode(to);

  let routeUrl = `https://router.project-osrm.org/route/v1/driving/${start.lon},${start.lat};${end.lon},${end.lat}?overview=full&geometries=geojson`;

  let res = await fetch(routeUrl);
  let data = await res.json();

  let route = data.routes[0];
  routeCoords = route.geometry.coordinates.map(c => [c[1], c[0]]);

  let distance = (route.distance/1000).toFixed(2);
  let redbull = distance > 50 ? 2 : 1;

  map.eachLayer(l => {
    if(l instanceof L.Polyline) map.removeLayer(l);
  });

  let polyline = L.polyline(routeCoords).addTo(map);
  map.fitBounds(polyline.getBounds());

  /* 📸 Dynamische Nachricht */
  document.getElementById("info").innerHTML = `
    👤 ${name}<br>
    🚗 Fahrer: ${driver.name}<br>
    🚘 ${driver.car}<br>
    📍 ${distance} km<br>
    🥤 ${redbull} Red Bull<br>
    <div class="status">⏳ Fahrt vorbereitet...</div>
    <br>
    📸 Bitte schicken Sie einen Screenshot Ihrer Fahrt<br>
    👉 ${driver.name} bearbeitet Ihre Anfrage manuell
  `;

  setTimeout(() => {
    document.getElementById("screen").style.display = "none";
    startDrive();
  }, 2500);
}

function startDrive(){

  step = 0;

  if(carMarker) map.removeLayer(carMarker);

  carMarker = L.marker(routeCoords[0]).addTo(map);

  timer = setInterval(() => {

    if(step >= routeCoords.length){
      clearInterval(timer);
      document.getElementById("info").innerHTML += "<div class='status'>✅ Angekommen!</div>";
      return;
    }

    carMarker.setLatLng(routeCoords[step]);
    step++;

  }, 250);
}

function resetRide() {

  document.getElementById("from").value = "";
  document.getElementById("to").value = "";
  document.getElementById("info").innerHTML = "";

  document.getElementById("screen").style.display = "none";

  if(carMarker) map.removeLayer(carMarker);

  map.eachLayer(l => {
    if(l instanceof L.Polyline) map.removeLayer(l);
  });

  clearInterval(timer);

  routeCoords = [];
  step = 0;

  map.setView([52.3759, 9.7320], 13);
}

</script>

</body>
</html>
